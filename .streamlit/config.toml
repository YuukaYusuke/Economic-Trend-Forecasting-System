[theme]
primaryColor = "#0d9488"
backgroundColor = "#f8fafc"
secondaryBackgroundColor = "#ffffff"
textColor = "#0f172a"
font = "sans serif"

[server]
headless = true
enableXsrfProtection = true
maxUploadSize = 50

[browser]
gatherUsageStats = false

[client]
toolbarMode = "viewer"

[runner]
fastReruns = true
